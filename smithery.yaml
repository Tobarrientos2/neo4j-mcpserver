# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties:
      connectionString:
        type: string
        description: "A comma-separated connection string: <uri>,<user>,<password>"
      neo4jUri:
        type: string
        description: The Neo4j URI
      neo4jUser:
        type: string
        description: The Neo4j user
      neo4jPassword:
        type: string
        description: The Neo4j password
    description: Configuration for the Neo4j MCP server
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => {
      const env = {};
      if (config.connectionString) {
        env.NEO4J_CONNECTION = config.connectionString;
      } else {
        env.NEO4J_URI = config.neo4jUri;
        env.NEO4J_USER = config.neo4jUser;
        env.NEO4J_PASSWORD = config.neo4jPassword;
      }
      return {
        command: 'node',
        args: ['build/index.js'],
        env,
      };
    }
  exampleConfig:
    neo4jUri: neo4j+s://example.databases.neo4j.io
    neo4jUser: neo4j
    neo4jPassword: your-password
